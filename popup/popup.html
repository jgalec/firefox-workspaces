<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspaces</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container" id="main-view">
        <header class="popup-header">
            <h1>Workspaces</h1>
            <div class="header-actions">
                <button id="show-create-ui-btn" class="icon-btn primary" title="New Workspace">
                    <span class="icon-svg icon-plus" style="margin-right: 6px;"></span>
                    New
                </button>
                <div class="options-container">
                    <button id="options-menu-btn" class="icon-btn secondary" title="More options">
                        <span class="icon-svg icon-menu"></span>
                    </button>
                    <div id="options-dropdown" class="options-dropdown hidden">
                        <button id="save-window-btn" class="dropdown-item">
                            <span class="icon-svg icon-save inline"></span>
                            Save tabs to a workspace
                        </button>
                        <div class="dropdown-separator"></div>
                        <button id="export-workspaces-btn" class="dropdown-item">
                            <span class="icon-svg icon-export inline"></span>
                            Export workspaces
                        </button>
                        <button id="restore-workspaces-btn" class="dropdown-item">
                            <span class="icon-svg icon-restore inline"></span>
                            Restore workspaces
                        </button>
                    </div>
                </div>
            </div>
        </header>
        
        <main>
            <div id="active-workspace-info" class="active-info">
                <span class="label">Active:</span>
                <span id="current-workspace-name" class="name">Loading...</span>
                <button id="toggle-reorder-btn" class="reorder-toggle-btn" title="Reorder Workspaces">
                    <span class="icon-svg icon-move"></span>
                </button>
            </div>

            <ul id="workspace-list" class="workspace-list">
                <!-- Workspaces will be injected here -->
            </ul>
        </main>
    </div>

    <!-- Create/Edit Workspace View (Hidden by default) -->
    <div class="container hidden" id="create-view">
        <header class="popup-header">
            <h1 id="create-view-title">New Workspace</h1>
        </header>
        <main class="create-form">
            <label for="new-ws-name">Name</label>
            <input type="text" id="new-ws-name" placeholder="e.g. Work, Travel..." autocomplete="off">
            
            <label>Color</label>
            <div id="color-picker" class="color-picker">
                <!-- Colors generated by JS -->
            </div>
        </main>
        <footer class="popup-footer actions">
            <button id="cancel-create-btn" class="btn-secondary">Cancel</button>
            <button id="confirm-create-btn" class="btn-primary">Create</button>
        </footer>
    </div>

    <!-- Delete Confirmation Modal (Overlay) -->
    <div class="container overlay hidden" id="delete-modal">
        <div class="modal-content">
            <h3>Delete <span id="delete-ws-name-display"></span>?</h3>
            <p>This action cannot be undone.</p>
            <p class="warning-text">All tabs and groups saved in this workspace will be permanently removed. Your browser history and bookmarks will not be affected.</p>
            <div class="modal-actions">
                <button id="cancel-delete-btn" class="btn-secondary">Cancel</button>
                <button id="confirm-delete-btn" class="btn-danger">Delete</button>
            </div>
        </div>
    </div>

    <template id="workspace-item-template">
        <li class="workspace-item">
            <div class="drag-handle hidden">
                <span class="icon-svg icon-drag"></span>
            </div>
            <div class="workspace-color"></div>
            <span class="workspace-name"></span>
            <div class="item-actions">
                <button class="edit-btn" title="Edit Workspace">
                    <span class="icon-svg icon-pencil"></span>
                </button>
                <button class="delete-btn" title="Delete Workspace">
                    <span class="icon-svg icon-trash"></span>
                </button>
            </div>
            <span class="status-indicator"></span>
        </li>
    </template>

    <script src="ui.js"></script>
    <script src="logic.js"></script>
    <script src="io.js"></script>
    <script src="popup.js"></script>
</body>
</html>
