<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firefox Workspaces</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container" id="main-view">
        <header class="popup-header">
            <h1>Workspaces</h1>
        </header>
        
        <main>
            <div id="active-workspace-info" class="active-info">
                <span class="label">Active:</span>
                <span id="current-workspace-name" class="name">Loading...</span>
            </div>

            <ul id="workspace-list" class="workspace-list">
                <!-- Workspaces will be injected here -->
            </ul>
        </main>

        <footer class="popup-footer">
            <button id="show-create-ui-btn" class="btn-primary">
                <span class="icon">+</span> New Workspace
            </button>
        </footer>
    </div>

    <!-- Create Workspace View (Hidden by default) -->
    <div class="container hidden" id="create-view">
        <header class="popup-header">
            <h1>New Workspace</h1>
        </header>
        <main class="create-form">
            <label for="new-ws-name">Name</label>
            <input type="text" id="new-ws-name" placeholder="e.g. Work, Travel..." autocomplete="off">
            
            <label>Color</label>
            <div id="color-picker" class="color-picker">
                <!-- Colors generated by JS -->
            </div>
        </main>
        <footer class="popup-footer actions">
            <button id="cancel-create-btn" class="btn-secondary">Cancel</button>
            <button id="confirm-create-btn" class="btn-primary">Create</button>
        </footer>
    </div>

    <template id="workspace-item-template">
        <li class="workspace-item">
            <div class="workspace-color"></div>
            <span class="workspace-name"></span>
            <span class="active-indicator">●</span>
        </li>
    </template>

    <script src="popup.js"></script>
</body>
</html>
